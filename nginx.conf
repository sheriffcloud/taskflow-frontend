server {
    listen 80;

    # Where the built React files live inside the container
    root /usr/share/nginx/html;
    index index.html;

    # API calls — proxy them to the api-gateway
    # When the React app calls /api/tasks, Nginx forwards
    # it to api-gateway instead of looking for a file called "tasks"
    location /api {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;

        # These headers are required for SSE to work through Nginx
        # Without them, Nginx would buffer the response and
        # the real-time messages would never reach the browser
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # All other requests — serve the React app
    # This is critical for React Router to work:
    # If someone visits /dashboard directly, Nginx serves index.html
    # and React Router takes over from there
    # Without this, Nginx would look for a file called "dashboard"
    # and return 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}