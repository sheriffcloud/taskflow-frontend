name: Frontend CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ENVIRONMENT: production

jobs:
  # ── JOB 1: Test ───────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build check
        run: npm run build
        # Verifies React app compiles successfully
        # Catches errors before they reach production

  # ── JOB 2: Build and Push ─────────────────────────────────────────────────
  build-and-push:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: image-tag
        run: |
          TAG=$(echo $GITHUB_SHA | cut -c1-8)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated image tag: $TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend
        run: |
          IMAGE=$ECR_REGISTRY/taskflow-$ENVIRONMENT-frontend
          TAG=${{ steps.image-tag.outputs.tag }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
          echo "Pushed $IMAGE:$TAG ✅"

  # ── JOB 3: Update K8s Manifests ───────────────────────────────────────────
  update-k8s:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout taskflow-k8s repo
        uses: actions/checkout@v4
        with:
          repository: sheriffcloud/taskflow-k8s
          token: ${{ secrets.K8S_REPO_TOKEN }}

      - name: Update frontend image tag
        run: |
          TAG=${{ needs.build-and-push.outputs.image-tag }}
          ECR=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

          sed -i "s|image:.*taskflow-production-frontend:.*|image: $ECR/taskflow-production-frontend:$TAG|g" \
            frontend/deployment.yaml

          echo "Updated frontend manifest to tag: $TAG"

      - name: Commit and push manifest changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "ci: update frontend image tag to ${{ needs.build-and-push.outputs.image-tag }}

          Triggered by: ${{ github.repository }}@${{ github.sha }}"
          git push